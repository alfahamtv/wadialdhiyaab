        `;

        const videoIDs = rawLinks.trim().split(/\s+/).map(url => {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }).filter(id => id !== null);

        const playlist = videoIDs.map((id, index) => {
            return { id: id, duration: (index === 0) ? 182 : 300 };
        });

        // المرجع الثابت: 8 مايو 2026
        const FIXED_EPOCH = new Date(2026, 4, 8, 0, 0, 0).getTime();
        let player;

        function onYouTubeIframeAPIReady() {
            syncStream();
        }

        function syncStream() {
            const currentTime = Date.now();
            const totalPlaylistTime = playlist.reduce((acc, v) => acc + v.duration, 0);
            let totalElapsed = Math.floor((currentTime - FIXED_EPOCH) / 1000);
            if (totalElapsed < 0) totalElapsed = 0;

            const currentPos = totalElapsed % totalPlaylistTime;
            let timeSum = 0;
            let targetIdx = 0;
            let seekTime = 0;

            for (let i = 0; i < playlist.length; i++) {
                if (currentPos < timeSum + playlist[i].duration) {
                    targetIdx = i;
                    seekTime = currentPos - timeSum;
                    break;
                }
                timeSum += playlist[i].duration;
            }
            loadVideo(playlist[targetIdx].id, seekTime);
        }

        function loadVideo(vidId, startTime) {
            if (player && player.loadVideoById) {
                player.loadVideoById({ videoId: vidId, startSeconds: startTime });
            } else {
                player = new YT.Player('player', {
                    videoId: vidId,
                    playerVars: { 
                        'autoplay': 1, 
                        'start': startTime, 
                        'controls': 1, 
                        'rel': 0, 
                        'playsinline': 1,
                        'modestbranding': 1
                    },
                    events: {
                        'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) syncStream(); },
                        'onError': () => syncStream()
                    }
                });
            }
        }
